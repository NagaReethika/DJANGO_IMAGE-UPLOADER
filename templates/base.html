<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNR MediaVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        .main-container { flex: 1; }
        .card { background-color: #1e293b !important; color: #f8fafc !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }
        .form-control { background-color: #0f172a !important; color: #fff !important; border: 1px solid #334155 !important; }
        .form-control:focus { border-color: #0dcaf0 !important; box-shadow: none !important; color: #fff !important; }
        .img-container { position: relative; width: 100%; height: 210px; background-color: #334155; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .preview-box { width: 100%; max-height: 200px; display: none; object-fit: contain; background: #0f172a; border-radius: 6px; }
        
        /* Unified Changing Color Title Effect */
        .color-shifting-title {
            font-weight: 800;
            background: linear-gradient(45deg, #0dcaf0, #0d6efd, #6610f2, #ef4444, #0dcaf0);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fluidGlowCycle 8s ease infinite;
        }
        @keyframes fluidGlowCycle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-black bg-opacity-40 border-bottom border-secondary border-opacity-20 mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand color-shifting-title fs-4" href="{% url 'home' %}">📸 RNR MEDIAVAULT</a>
            {% if user.is_authenticated %}
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white-50 small"><i class="bi bi-person-circle"></i> User: <strong>{{ user.username }}</strong></span>
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger px-3">Sign Out</a>
                </div>
            {% endif %}
        </div>
    </nav>

    <div class="container main-container my-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info alert-dismissible fade show shadow-sm border-0 text-dark bg-info" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="bg-black bg-opacity-40 text-white-50 text-center py-3 mt-auto border-top border-secondary border-opacity-10">
        <small>&copy; 2026 RNR MediaVault.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
